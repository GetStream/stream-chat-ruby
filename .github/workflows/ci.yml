name: test

on: [pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        ruby: ["3.0", "3.1", "3.4", "4.0"]
        include:
          # Add lint: true to any Ruby version that should run rubocop + srb tc.
          # Always include 4.0; also add it to the latest Ruby when a newer version is added.
          - ruby: "4.0"
            lint: true
          - ruby: "3.4"
            lint: true
          # Exercise jwt v3 alongside the default v2 resolution.
          - ruby: "4.0"
            jwt: "~> 3.0"
    name: 💎 Ruby ${{ matrix.ruby }}${{ matrix.jwt && format(' (jwt {0})', matrix.jwt) || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gives the commit linter access to previous commits

      - name: Pin jwt to ${{ matrix.jwt }}
        if: matrix.jwt
        run: echo "gem 'jwt', '${{ matrix.jwt }}'" >> Gemfile

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - run: bundle exec rake rubocop
        if: ${{ matrix.lint == true }}

      - run: bundle exec srb tc
        if: ${{ matrix.lint == true }}

      - run: bundle exec rspec ./spec --require spec_helper
        env:
          STREAM_KEY: ${{ secrets.STREAM_CHAT_API_KEY }}
          STREAM_SECRET: ${{ secrets.STREAM_CHAT_API_SECRET }}
